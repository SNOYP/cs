<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админ Панель | SkinCasino</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-body: #0b0c11; --bg-card: #13151c; --bg-input: #090a0e; --accent-blue: #3d7fff; --accent-cyan: #00e7ff; --text-main: #ffffff; --text-sec: #767c91; --card-border: #1e222d; }
        body { background: var(--bg-body); color: var(--text-main); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .admin-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px;}
        .page-title { text-align: center; font-size: 24px; color: var(--accent-cyan); letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; font-weight: 800; }
        .card { background: var(--bg-card); border-radius: 8px; padding: 25px 20px; border: 1px solid var(--card-border); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; font-size: 18px; font-weight: bold; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--text-sec); font-size: 12px; text-transform: uppercase; }
        .input-field { background: var(--bg-input); border: 1px solid var(--card-border); border-radius: 6px; padding: 12px 15px; color: white; outline: none; font-size: 14px; width: 100%; box-sizing: border-box; transition: 0.2s; }
        .input-field:focus { border-color: var(--accent-blue); }
        .btn-submit { width: 100%; background: linear-gradient(90deg, #3d7fff, #00e7ff); color: black; font-weight: 800; border: none; padding: 14px; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 14px; margin-top: 10px; }
        .alert { padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; text-align: center; }
        .alert-success { background: rgba(0, 231, 255, 0.1); color: var(--accent-cyan); border: 1px solid rgba(0, 231, 255, 0.2); }
        .alert-error { background: rgba(255, 82, 82, 0.1); color: #ff5252; border: 1px solid rgba(255, 82, 82, 0.2); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-sec); text-decoration: none; font-size: 14px; }

        /* Таблица трейдов */
        .trade-item { background: var(--bg-input); padding: 15px; border-radius: 8px; border: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
        .trade-info strong { color: #ffcc00; }
        .trade-actions { display: flex; gap: 10px; }
        .btn-approve { background: #54b947; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-ban { background: #ff4b2b; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

<div class="admin-container">
    <div class="page-title"><i class="fas fa-shield-alt"></i> Панель Администратора</div>

    <div th:if="${param.success}" class="alert alert-success" th:text="${param.success}">Успешно!</div>
    <div th:if="${param.error}" class="alert alert-error" th:text="${param.error}">Ошибка</div>

    <div class="card">
        <div class="card-header"><i class="fas fa-exchange-alt" style="color: #00e7ff;"></i> Ожидающие Депозиты</div>
        <div th:if="${pendingDeposits.isEmpty()}" style="color: var(--text-sec); text-align: center;">Нет новых заявок</div>

        <div th:each="entry : ${pendingDeposits}" class="trade-item">
            <div class="trade-info">
                Игрок: <span th:text="${entry.key}" style="color: white; font-weight:bold;"></span> <br>
                Ожидает: <strong th:text="${entry.value} + ' монет'"></strong>
            </div>
            <div class="trade-actions">
                <form action="/admin/approve-deposit" method="post">
                    <input type="hidden" name="username" th:value="${entry.key}">
                    <button type="submit" class="btn-approve">Одобрить</button>
                </form>
                <form action="/admin/ban-user" method="post" onsubmit="return confirm('Забанить навсегда?');">
                    <input type="hidden" name="username" th:value="${entry.key}">
                    <button type="submit" class="btn-ban">БАН</button>
                </form>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><i class="fas fa-coins" style="color: #ffcc00;"></i> Выдать монеты вручную</div>
        <form action="/admin/add-balance" method="post">
            <div class="input-group">
                <label>Никнейм игрока</label>
                <select name="username" class="input-field" required>
                    <option th:each="u : ${users}" th:value="${u.username}" th:text="${u.username} + ' (Баланс: ' + ${u.balance} + ')'"></option>
                </select>
            </div>
            <div class="input-group">
                <label>Сумма пополнения</label>
                <input type="number" name="amount" class="input-field" placeholder="1000" min="1" required>
            </div>
            <button type="submit" class="btn-submit">Начислить монеты</button>
        </form>
    </div>

    <a href="/" class="back-link">← Вернуться на сайт</a>
</div>

</body>
</html>
