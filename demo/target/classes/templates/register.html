<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Регистрация | SkinCasino</title>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-body: #0b0c11;
            --bg-card: #13151c;
            --bg-input: #090a0e;
            --accent-blue: #3d7fff;
            --accent-cyan: #00e7ff;
            --text-main: #ffffff;
            --text-sec: #767c91;
            --card-border: #1e222d;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            width: 340px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h2 {
            color: var(--accent-cyan);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            font-size: 22px;
            text-shadow: 0 0 10px rgba(0, 231, 255, 0.3);
        }

        .input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 15px;
            margin-bottom: 15px;
            background: var(--bg-input);
            border: 1px solid var(--card-border);
            color: white;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(61, 127, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            font-weight: 800;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
            color: #000;
            text-transform: uppercase;
            font-size: 15px;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(61, 127, 255, 0.3);
        }

        .btn-submit:hover {
            opacity: 0.9;
            box-shadow: 0 6px 20px rgba(0, 231, 255, 0.5);
            transform: translateY(-1px);
        }

        .error {
            color: #ff4b2b;
            font-size: 13px;
            margin-bottom: 15px;
            background: rgba(255, 75, 43, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 75, 43, 0.2);
        }

        .link-text {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-sec);
        }

        .link-text a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .link-text a:hover {
            text-shadow: 0 0 8px rgba(0, 231, 255, 0.4);
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Регистрация</h2>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form action="/register" method="post">
        <input type="text" name="username" class="input-field" placeholder="Придумайте логин" required autocomplete="off">
        <input type="password" name="password" class="input-field" placeholder="Придумайте пароль" required>
        <button type="submit" class="btn-submit">Создать аккаунт</button>
    </form>

    <div class="link-text">
        Уже есть аккаунт? <a href="/login">Войти</a>
    </div>
</div>
</body>
</html>
