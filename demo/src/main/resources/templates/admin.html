<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админ Панель | SkinCasino</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0b0c11;
            --bg-card: #13151c;
            --bg-input: #090a0e;
            --accent-blue: #3d7fff;
            --accent-cyan: #00e7ff;
            --text-main: #ffffff;
            --text-sec: #767c91;
            --card-border: #1e222d;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .admin-container {
            width: 100%;
            max-width: 500px;
        }

        .page-title {
            text-align: center;
            font-size: 24px;
            color: var(--accent-cyan);
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 25px 20px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .card-header i { color: #ff4b2b; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--text-sec); font-size: 12px; text-transform: uppercase; }

        .input-field {
            background: var(--bg-input);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 12px 15px;
            color: white;
            outline: none;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            transition: 0.2s;
        }
        .input-field:focus { border-color: var(--accent-blue); }

        .btn-submit {
            width: 100%;
            background: linear-gradient(90deg, #ff4b2b, #ff416c);
            color: white;
            font-weight: 800;
            border: none;
            padding: 14px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(255, 75, 43, 0.4); }

        .alert { padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; text-align: center; }
        .alert-success { background: rgba(0, 231, 255, 0.1); color: var(--accent-cyan); border: 1px solid rgba(0, 231, 255, 0.2); }
        .alert-error { background: rgba(255, 82, 82, 0.1); color: #ff5252; border: 1px solid rgba(255, 82, 82, 0.2); }

        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-sec); text-decoration: none; font-size: 14px; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="page-title"><i class="fas fa-shield-alt"></i> Панель Администратора</div>

    <div class="card">
        <div class="card-header">
            <i class="fas fa-coins"></i> Выдать монеты
        </div>

        <div th:if="${param.success}" class="alert alert-success" th:text="${param.success}">Успешно!</div>
        <div th:if="${param.error}" class="alert alert-error" th:text="${param.error}">Ошибка</div>

        <form action="/admin/add-balance" method="post">
            <div class="input-group">
                <label>Никнейм игрока</label>
                <select name="username" class="input-field" required>
                    <option value="" disabled selected>-- Выберите игрока --</option>
                    <option th:each="u : ${users}" th:value="${u.username}" th:text="${u.username} + ' (Баланс: ' + ${u.balance} + ')'"></option>
                </select>
            </div>

            <div class="input-group">
                <label>Сумма пополнения</label>
                <input type="number" name="amount" class="input-field" placeholder="Например: 1000" min="1" required>
            </div>

            <button type="submit" class="btn-submit">Начислить монеты</button>
        </form>
    </div>

    <a href="/" class="back-link">← Вернуться на сайт</a>
</div>

</body>
</html>
