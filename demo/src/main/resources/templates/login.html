<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Авторизация | SkinCasino</title>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0b0c11;
            --bg-card: #13151c;
            --bg-input: #090a0e;
            --accent-blue: #3d7fff;
            --accent-cyan: #00e7ff;
            --text-main: #ffffff;
            --text-sec: #767c91;
            --card-border: #1e222d;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        .box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            width: 340px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h2 {
            color: var(--accent-cyan);
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 20px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 231, 255, 0.3);
        }

        .input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 15px;
            margin-bottom: 15px;
            background: var(--bg-input);
            border: 1px solid var(--card-border);
            color: white;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .input-field:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(61, 127, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            font-weight: 800;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 15px;
            color: #000;
            text-transform: uppercase;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(61, 127, 255, 0.3);
        }
        .btn-submit:hover {
            opacity: 0.9;
            box-shadow: 0 6px 20px rgba(0, 231, 255, 0.5);
            transform: translateY(-1px);
        }

        .steam-btn {
            background: #171a21;
            color: #c5d4de;
            border: 1px solid #2a475e;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s;
            margin-top: 10px;
            font-size: 15px;
        }
        .steam-btn:hover {
            background: #2a475e;
            color: white;
            box-shadow: 0 5px 15px rgba(42, 71, 94, 0.4);
            transform: translateY(-2px);
        }
        .steam-btn i { margin-right: 10px; font-size: 18px; }

        .sub-text { margin-top: 25px; font-size: 13px; color: var(--text-sec); }
        .sub-text a { color: var(--accent-cyan); text-decoration: none; font-weight: bold; transition: 0.2s;}
        .sub-text a:hover { text-shadow: 0 0 8px rgba(0, 231, 255, 0.4); }

        .error { color: #ff4b2b; font-size: 13px; margin-bottom: 15px; background: rgba(255, 75, 43, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(255, 75, 43, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h2>Вход по паролю</h2>
        <div th:if="${param.error}" class="error">Неверный логин или пароль</div>
        <div th:if="${param.registered}" style="color: #00e7ff; margin-bottom: 15px; font-size: 13px;">Регистрация успешна!</div>

        <form action="/login" method="post">
            <input type="text" name="username" class="input-field" placeholder="Логин" required>
            <input type="password" name="password" class="input-field" placeholder="Пароль" required>
            <button type="submit" class="btn-submit">Войти</button>
        </form>
        <div class="sub-text">
            Нет аккаунта? <a href="/register">Регистрация</a>
        </div>
    </div>

    <div class="box">
        <h2>Player Login</h2>
        <p style="color: var(--text-sec); margin-bottom: 25px; font-size: 14px;">Быстрый вход через Steam</p>

        <a href="/auth/steam/login" class="steam-btn">
            <i class="fab fa-steam"></i> Sign in with Steam
        </a>
    </div>
</div>

</body>
</html>
